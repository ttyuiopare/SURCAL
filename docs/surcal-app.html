  Award, CheckCircle, Eye, ThumbsUp, ArrowLeft, Send, X, Menu, ChevronDown, Sparkles,

// Images
const IMG = {

  community: "https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=800&q=80",
};

// Categories (static — these are the marketplace categories)
const CATS = [
  { name: "Electronics", icon: "⚡", count: 0 },
  { name: "Fashion", icon: "👔", count: 0 },
  { name: "Collectibles", icon: "🏆", count: 0 },
  { name: "Home & Garden", icon: "🏠", count: 0 },
  { name: "Music", icon: "🎵", count: 0 },
  { name: "Sports", icon: "⚽", count: 0 },
  { name: "Art", icon: "🎨", count: 0 },
  { name: "Books", icon: "📚", count: 0 },
];

// Live data — starts empty, populated from Supabase
let REQS = [];
let BIDS = [];

const STAT_DATA = [
  { label:"Active Requests", value:"0", icon:Target },
  { label:"Fulfilled Today", value:"0", icon:CheckCircle },
  { label:"Verified Sellers", value:"0", icon:Shield },
  { label:"Avg. Response", value:"—", icon:Zap },
];

// ─── DATA HOOKS ───
function useRequests() {
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function fetch() {
      const { data, error } = await supabase
        .from("requests")
        .select("*, profiles!requests_buyer_id_fkey(username, avatar_url, buyer_rating), categories(name, slug)")
        .eq("status", "open")
        .order("created_at", { ascending: false });
      if (data) {
        setRequests(data.map(r => ({
          id: r.id,
          title: r.title,
          cat: r.categories?.name || "General",
          budget: r.budget_min && r.budget_max ? "$" + r.budget_min.toLocaleString() + " - $" + r.budget_max.toLocaleString() : "Open",
          budget_min: r.budget_min,
          budget_max: r.budget_max,
          bids: r.bid_count || 0,
          time: r.expires_at ? timeLeft(r.expires_at) : "No deadline",
          img: IMG[Object.keys(IMG)[Math.floor(Math.random() * 10)]] || IMG.hero,
          user: r.profiles?.username || "Anonymous",
          avatar: r.profiles?.avatar_url || IMG.pM,
          urgent: r.urgency === "urgent" || r.urgency === "high",
          desc: r.description,
          loc: r.location || "",
          tags: r.tags || [],
          raw: r,
        })));
      }
      setLoading(false);
    }
    fetch();

    // Real-time subscription
    const channel = supabase.channel("requests_realtime")
      .on("postgres_changes", { event: "*", schema: "public", table: "requests" }, () => fetch())
      .subscribe();
    return () => supabase.removeChannel(channel);
  }, []);

  return { requests, loading };
}

function useBids(requestId) {
  const [bids, setBids] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!requestId) { setLoading(false); return; }
    async function fetch() {
      const { data } = await supabase
        .from("bids")
        .select("*, profiles!bids_seller_id_fkey(username, avatar_url, seller_rating, total_sales, is_seller)")
        .eq("request_id", requestId)
        .order("created_at", { ascending: false });
      if (data) {
        setBids(data.map(b => ({
          id: b.id,
          seller: b.profiles?.username || "Seller",
          avatar: b.profiles?.avatar_url || IMG.pM,
          price: "$" + parseFloat(b.amount).toLocaleString(),
          rating: b.profiles?.seller_rating || 0,
          reviews: b.profiles?.total_sales || 0,
          msg: b.message || "",
          time: timeAgo(b.created_at),
          verified: b.profiles?.is_seller || false,
          delivery_time: b.delivery_time || "",
          status: b.status,
          raw: b,
        })));
      }
      setLoading(false);
    }
    fetch();
    const channel = supabase.channel("bids_" + requestId)
      .on("postgres_changes", { event: "*", schema: "public", table: "bids", filter: "request_id=eq." + requestId }, () => fetch())
      .subscribe();
    return () => supabase.removeChannel(channel);
  }, [requestId]);

  return { bids, loading };
}

function timeLeft(dateStr) {
  const diff = new Date(dateStr) - new Date();
  if (diff <= 0) return "Expired";
  const hours = Math.floor(diff / 3600000);
  if (hours < 24) return hours + "h left";
  return Math.floor(hours / 24) + "d left";
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + "m ago";
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + "h ago";
  return Math.floor(hours / 24) + "d ago";
}

// ─── AI SELLER TRUST SCORING ───
function calcTrustScore(seller) {
  const ratingScore = (seller.rating / 5) * 40;
  const reviewScore = Math.min(seller.reviews / 200, 1) * 25;
  const verifiedScore = seller.verified ? 20 : 0;
  const timeScore = 15; // base score for being active
  return Math.round(ratingScore + reviewScore + verifiedScore + timeScore);
}

function getTrustLevel(score) {
  if (score >= 90) return { label: "ELITE SELLER", color: "#FFB800", icon: "Award" };
  if (score >= 75) return { label: "TRUSTED", color: AIL, icon: "Shield" };
  if (score >= 60) return { label: "VERIFIED", color: "#4A90D9", icon: "CheckCircle" };
  return { label: "NEW", color: TS, icon: "User" };
}

// ─── AI SMART MATCH SCORING ───
function calcMatchScore(request, seller) {
  let score = 60 + Math.random() * 35;
  if (seller.verified) score += 5;
  if (seller.rating >= 4.8) score += 5;
  return Math.min(Math.round(score), 99);
}

// Toast system
const ToastCtx = createContext();

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const idRef = useRef(0);

  const toast = useCallback((message, type="success") => {
    const id = ++idRef.current;
    setToasts(t => [...t, { id, message, type, exiting: false }]);
    setTimeout(() => {
      setToasts(t => t.map(x => x.id === id ? { ...x, exiting: true } : x));
      setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 300);
    }, 2500);
  }, []);

  return React.createElement(ToastCtx.Provider, { value: toast },
    children,
    React.createElement("div", { style: { position:"fixed", top:84, right:20, zIndex:9999, display:"flex", flexDirection:"column", gap:"8px" } },
      toasts.map(t => React.createElement("div", {

const AuthCtx = createContext();

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    // Check existing session
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        setUser(session.user);
        fetchProfile(session.user.id);
      }
      setLoading(false);
    });
    // Listen for auth changes
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      if (session?.user) {
        setUser(session.user);
        fetchProfile(session.user.id);
      } else {
        setUser(null);
        setProfile(null);
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  const fetchProfile = async (uid) => {
    const { data } = await supabase.from("profiles").select("*").eq("id", uid).single();
    if (data) setProfile(data);
  };

  const signup = async (email, password, username) => {
    const { data, error } = await supabase.auth.signUp({
      email, password,
      options: { data: { username, full_name: username } }
    });
    if (error) throw error;
    return data;
  };

  const signin = async (email, password) => {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    return data;
  };

  const signout = async () => {
    await supabase.auth.signOut();
    setUser(null);
    setProfile(null);
  };

  const authUser = user ? { ...user, username: profile?.username || user.email?.split("@")[0], avatar_url: profile?.avatar_url, profile } : null;

  return React.createElement(AuthCtx.Provider, { value: { user: authUser, loading, signup, signin, signout, profile, supabase } }, children);
}
